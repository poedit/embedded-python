name: Build

on: [push, pull_request]

jobs:
  build-macos:
    name: Build for macOS
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v6

    - uses: maxim-lobanov/setup-xcode@v1

    - name: Build and test
      run: xcodebuild -project EmbeddedPython.xcodeproj -scheme EmbeddedPython -destination 'platform=macOS' build
